name: Issue Triage

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  triage:
    name: Auto Label Severity Level
    runs-on: ubuntu-latest
    steps:
      - name: Parse and Label Level
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';

            // Search for "Level X:" in the issue form markdown body
            const match = body.match(/Level\s+(\d+)\s*:/i);
            if (match) {
              const levelNum = match[1];
              const labelToAdd = `level ${levelNum}`;
              console.log(`Found level selection: ${labelToAdd}`);
              
              // Get current labels
              const currentLabels = issue.labels.map(l => l.name);
              
              // Remove old level labels if they exist (to handle level updates during issue edits)
              const labelsToRemove = currentLabels.filter(name => name.startsWith('level ') && name !== labelToAdd);
              
              for (const oldLabel of labelsToRemove) {
                console.log(`Removing outdated label: ${oldLabel}`);
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    name: oldLabel
                  });
                } catch (e) {
                  console.log(`Could not remove label ${oldLabel} (it might not be on the issue):`, e);
                }
              }
              
              // Add the new level label if not already present
              if (!currentLabels.includes(labelToAdd)) {
                console.log(`Adding label: ${labelToAdd}`);
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: [labelToAdd]
                });
              }
            } else {
              console.log('No level matching "Level X:" was found in the issue body.');
            }
