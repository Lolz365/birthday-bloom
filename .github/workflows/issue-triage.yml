name: Issue Triage

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  triage:
    name: Auto Label Difficulty
    runs-on: ubuntu-latest
    steps:
      - name: Parse and Label Difficulty
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';

            // Search for "level: beginner|intermediate|advanced" in the issue form markdown body
            const match = body.match(/level:\s*(beginner|intermediate|advanced)/i);
            if (match) {
              const levelVal = match[1].toLowerCase();
              const labelToAdd = `level:${levelVal}`;
              console.log(`Found level selection: ${labelToAdd}`);
              
              // Get current labels
              const currentLabels = issue.labels.map(l => l.name);
              
              // Remove old difficulty/level labels if they exist (to handle updates during issue edits)
              const labelsToRemove = currentLabels.filter(name => (name.startsWith('difficulty: ') || name.startsWith('level:')) && name !== labelToAdd);
              
              for (const oldLabel of labelsToRemove) {
                console.log(`Removing outdated difficulty label: ${oldLabel}`);
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    name: oldLabel
                  });
                } catch (e) {
                  console.log(`Could not remove label ${oldLabel} (it might not be on the issue):`, e);
                }
              }
              
              // Add the new difficulty label if not already present
              if (!currentLabels.includes(labelToAdd)) {
                console.log(`Adding label: ${labelToAdd}`);
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: [labelToAdd]
                });
              }
            } else {
              console.log('No difficulty matching "difficulty: <val>" was found in the issue body.');
            }
