name: PR Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Auto Label PR
    runs-on: ubuntu-latest
    steps:
      # Step 1: Label based on file paths
      - name: Path-based Labeler
        uses: actions/labeler@v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/labeler.yml
          sync-labels: true

      # Step 2: Label based on branch name prefix
      - name: Branch-based Labeler
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const branchName = pr.head.ref.toLowerCase();
            const labelsToAdd = new Set();
            
            if (branchName.startsWith('feat/')) {
              labelsToAdd.add('enhancement');
            } else if (branchName.startsWith('fix/')) {
              labelsToAdd.add('bug');
            } else if (branchName.startsWith('docs/')) {
              labelsToAdd.add('documentation');
            } else if (branchName.startsWith('perf/')) {
              labelsToAdd.add('performance');
            } else if (branchName.startsWith('refactor/')) {
              labelsToAdd.add('refactor');
            } else if (branchName.startsWith('chore/') || branchName.startsWith('ci/')) {
              labelsToAdd.add('ci-cd');
            }

            if (labelsToAdd.size > 0) {
              const labelArray = Array.from(labelsToAdd);
              console.log(`Adding branch-based labels: ${labelArray.join(', ')}`);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: labelArray
              });
            }
