name: Sync Labels

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/sync-labels.yml'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync:
    name: Sync Repository Labels
    runs-on: ubuntu-latest
    steps:
      - name: Sync Labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              // Standard & Specific categories (unified for both Issues and PRs)
              { name: "bug", color: "ee0701", description: "Something isn't working or needs a fix" },
              { name: "enhancement", color: "a2eeef", description: "New feature or request" },
              { name: "documentation", color: "0075ca", description: "Improvements or additions to documentation" },
              { name: "performance", color: "cccccc", description: "Performance regression or improvement" },
              { name: "question", color: "cc317c", description: "Further information is requested" },
              { name: "security", color: "e11d21", description: "Security vulnerability or hardening" },
              { name: "accessibility", color: "5319e7", description: "Accessibility (WCAG) compatibility and fixes" },
              { name: "customization", color: "bfd4f2", description: "Environment variables, templates, and asset customization" },
              { name: "refactor", color: "fef2c0", description: "Refactoring code style, file structure, or performance" },
              { name: "ci-cd", color: "fbca04", description: "GitHub Actions, Vercel, Netlify, Docker configuration" },
              { name: "test", color: "bfdadc", description: "Adding or updating tests" },
              { name: "chore", color: "cfd3d7", description: "Routine tasks, maintenance, build tasks" },
              { name: "style", color: "bfd4f2", description: "Changes that do not affect the meaning of the code" },

              // Issue Difficulty Levels
              { name: "level:beginner", color: "9fedab", description: "Good first issue, simple tasks" },
              { name: "level:intermediate", color: "fcf692", description: "Requires basic knowledge of React/Tailwind" },
              { name: "level:advanced", color: "ff9999", description: "Complex animation, state management, or performance tuning" },

              // PR Complexity Levels
              { name: "pr-level:trivial", color: "c5def5", description: "Trivial PR: typo fixes, <10 lines, 1 file" },
              { name: "pr-level:beginner", color: "9fedab", description: "Beginner PR: <50 lines, <=3 files" },
              { name: "pr-level:intermediate", color: "fcf692", description: "Intermediate PR: <=300 lines, <=10 files" },
              { name: "pr-level:advanced", color: "ff9999", description: "Advanced PR: <=800 lines, <=25 files" },
              { name: "pr-level:major", color: "e11d21", description: "Major PR: >800 lines or >25 files - needs extra maintainer attention" },

              // PR Statuses
              { name: "status:draft", color: "cfd3d7", description: "Work in progress; not ready for review" },
              { name: "status:needs-review", color: "6bc5e8", description: "Waiting for reviewer response" },
              { name: "status:changes-requested", color: "e11d21", description: "Reviewers requested changes to be made" },
              { name: "status:approved", color: "006b75", description: "PR has been approved by reviewers" },
              { name: "status:ready-to-merge", color: "9fedab", description: "Approved, all checks passing, and mergeable" },
              { name: "status:merge-conflict", color: "e11d21", description: "PR has merge conflicts that must be resolved" },
              { name: "status:ci-failing", color: "ee0701", description: "PR build, lint, or tests are failing" },

              // PR Areas (Only unique frontend and core areas remain; others map to standard tags)
              { name: "area:frontend", color: "d4c5f9", description: "Changes to frontend/UI/UX components and styles" },
              { name: "area:core", color: "bfdadc", description: "Changes to core business logic, store, or services" },

              // Contributor Statuses
              { name: "first-time-contributor", color: "c2e0c6", description: "First time contributing to this repository" },
              { name: "returning-contributor", color: "a2eeef", description: "Returned contributor with prior merged PRs" },

              // Solutions / Resolutions
              { name: "resolution: fixed", color: "006b75", description: "Resolved by code change" },
              { name: "resolution: duplicate", color: "cfd3d7", description: "Duplicate of another issue" },
              { name: "resolution: invalid", color: "e4e669", description: "Not reproducible or not a bug" },
              { name: "resolution: wontfix", color: "ffffff", description: "Decided not to fix or implement" },
              { name: "resolution: solved-by-config", color: "c5def5", description: "Resolved by configuration / env change" },

              // Work Statuses
              { name: "status: triage", color: "6bc5e8", description: "Needs triage review" },
              { name: "status: help-wanted", color: "c2e0c6", description: "Community help requested" },
              { name: "status: in-progress", color: "fef2c0", description: "Active development ongoing" },
              { name: "status: blocked", color: "e11d21", description: "Waiting on details or dependencies" }
            ];

            for (const label of labels) {
              try {
                // Try to get the label first
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });
                console.log(`Updating label: ${label.name}`);
                await github.rest.issues.updateLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
              } catch (error) {
                if (error.status === 404) {
                  console.log(`Creating label: ${label.name}`);
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                } else {
                  console.error(`Failed to handle label ${label.name}:`, error);
                  throw error;
                }
              }
            }

            // Delete obsolete level and duplicate type/area/scope labels
            const labelsToDelete = [
              // Obsolete numbered levels
              "level 1", "level 2", "level 3", "level 4", "level 5", "level 6", "level 7",
              "level 8", "level 9", "level 10", "level 11", "level 12",
              
              // Duplicate PR type labels
              "type:feature", "type:bugfix", "type:docs", "type:refactor", "type:chore",
              "type:test", "type:ci", "type:style", "type:performance",
              
              // Duplicate PR area labels
              "area:customization", "area:docs", "area:ci-cd", "area:tests",
              
              // Obsolete scope labels
              "scope: animation", "scope: core", "scope: ui-ux", "scope: assets"
            ];

            for (const labelName of labelsToDelete) {
              try {
                await github.rest.issues.deleteLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName
                });
                console.log(`Successfully deleted obsolete label: ${labelName}`);
              } catch (error) {
                if (error.status !== 404) {
                  console.error(`Failed to delete label ${labelName}:`, error);
                } else {
                  console.log(`Label ${labelName} already deleted or not found.`);
                }
              }
            }


