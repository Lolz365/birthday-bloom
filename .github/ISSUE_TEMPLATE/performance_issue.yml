name: Performance Issue
description: Report a performance regression or optimization opportunity
labels: [performance]
body:
  - type: markdown
    attributes:
      value: |
        Help keep Birthday Bloom smooth and fast. Please provide as much detail as possible.

  - type: textarea
    id: summary
    attributes:
      label: What feels slow or janky?
      description: Be specific about which part of the experience is affected.
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device & Browser
      description: e.g., Pixel 7 / Chrome, MacBook Pro M2 / Safari
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Path
      description: Steps to see the performance issue.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Which area is affected?
      options:
        - Intro / cinematic sequence
        - Main dashboard / scrolling
        - Cake cutting interaction
        - Photo gallery
        - Heart tree animation
        - Particle effects / confetti
        - Video playback
        - Page load / initial render
        - Other

  - type: textarea
    id: metrics
    attributes:
      label: Observed Metrics
      description: FPS, load time, Lighthouse scores if measured.
      placeholder: "e.g., ~20fps during cake cutting on Pixel 7"

  - type: textarea
    id: recordings
    attributes:
      label: Recordings / Profiles
      description: Chrome DevTools Performance tab recordings, screenshots, or videos.

  - type: dropdown
    id: level
    attributes:
      label: Severity / Triage Level
      description: Select the impact or priority level of this issue.
      options:
        - "Level 1: Blocker (Crash, data loss, security vulnerability)"
        - "Level 2: Critical (Core feature broken, major UI crash)"
        - "Level 3: Major (Main element broken, significant animation lag)"
        - "Level 4: Moderate (Secondary feature glitch, layout alignment issue)"
        - "Level 5: Minor (Small UI glitch, console warning)"
        - "Level 6: Cosmetic (Typo, theme styling polish, visual improvement)"
        - "Level 7: Enhancement (New custom relationship template or feature idea)"
        - "Level 8: Refactor (Code smell, tech debt, directory cleanup)"
        - "Level 9: Documentation (FAQ, ENV_GUIDE, readme update)"
        - "Level 10: Customization (Creating new templates, custom emoji set configs)"
        - "Level 11: Accessibility (Aria-label, keyboard navigation, screen reader fix)"
        - "Level 12: CI/CD & Security (Build warning, GitHub Action improvement)"
    validations:
      required: true
