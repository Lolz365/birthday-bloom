name: Security Report
description: Suggest security improvements, report dependency vulnerabilities, or request hardening.
labels: [security]
body:
  - type: markdown
    attributes:
      value: |
        ### Important Notice
        If you are reporting a critical security vulnerability that could compromise user deployments or leak sensitive developer keys, please do **not** open a public issue. Refer to [SECURITY.md](https://github.com/naborajs/birthday-bloom/blob/main/SECURITY.md) to report it privately.

  - type: textarea
    id: details
    attributes:
      label: Security Hardening or Issue Description
      description: Provide clear details of the security issue, vulnerabilities identified, or proposed hardening.
    validations:
      required: true

  - type: textarea
    id: replication
    attributes:
      label: Steps to Reproduce / Proof of Concept
      description: Provide reproduction steps, payload details, or proof of concept if public-safe.

  - type: dropdown
    id: level
    attributes:
      label: Severity / Triage Level
      description: Select the impact or priority level of this issue.
      options:
        - "Level 1: Blocker (Crash, data loss, security vulnerability)"
        - "Level 2: Critical (Core feature broken, major UI crash)"
        - "Level 3: Major (Main element broken, significant animation lag)"
        - "Level 4: Moderate (Secondary feature glitch, layout alignment issue)"
        - "Level 5: Minor (Small UI glitch, console warning)"
        - "Level 6: Cosmetic (Typo, theme styling polish, visual improvement)"
        - "Level 7: Enhancement (New custom relationship template or feature idea)"
        - "Level 8: Refactor (Code smell, tech debt, directory cleanup)"
        - "Level 9: Documentation (FAQ, ENV_GUIDE, readme update)"
        - "Level 10: Customization (Creating new templates, custom emoji set configs)"
        - "Level 11: Accessibility (Aria-label, keyboard navigation, screen reader fix)"
        - "Level 12: CI/CD & Security (Build warning, GitHub Action improvement)"
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I verified that this does not disclose a critical/exploitable vulnerability publicly
          required: true
