name: Question
description: Ask a question about using or contributing to Birthday Bloom
labels: [question]
body:
  - type: markdown
    attributes:
      value: |
        Before asking, please check:
        - [ENV_GUIDE.md](https://github.com/naborajs/birthday-bloom/blob/main/docs/ENV_GUIDE.md) for env configuration questions
        - [Troubleshooting](https://github.com/naborajs/birthday-bloom/blob/main/docs/troubleshooting.md) for common issues
        - [FAQ](https://github.com/naborajs/birthday-bloom/blob/main/FAQ.md) for frequent questions

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Setup / Installation
        - Customization / Env Configuration
        - Deployment
        - Development / Contributing
        - Feature availability
        - Other

  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty Level
      description: Select the estimated difficulty level.
      options:
        - "difficulty: beginner (Good first issue, simple CSS/HTML tweaks)"
        - "difficulty: intermediate (Standard React components and state)"
        - "difficulty: advanced (Complex animations, core architecture changes)"
    validations:
      required: true
