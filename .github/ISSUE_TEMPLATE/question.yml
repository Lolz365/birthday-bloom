name: Question
description: Ask a question about using or contributing to Birthday Bloom
labels: [question]
body:
  - type: markdown
    attributes:
      value: |
        Before asking, please check:
        - [ENV_GUIDE.md](https://github.com/naborajs/birthday-bloom/blob/main/docs/ENV_GUIDE.md) for env configuration questions
        - [Troubleshooting](https://github.com/naborajs/birthday-bloom/blob/main/docs/troubleshooting.md) for common issues
        - [FAQ](https://github.com/naborajs/birthday-bloom/blob/main/FAQ.md) for frequent questions

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Setup / Installation
        - Customization / Env Configuration
        - Deployment
        - Development / Contributing
        - Feature availability
        - Other

  - type: dropdown
    id: level
    attributes:
      label: Severity / Triage Level
      description: Select the impact or priority level of this issue.
      options:
        - "Level 1: Blocker (Crash, data loss, security vulnerability)"
        - "Level 2: Critical (Core feature broken, major UI crash)"
        - "Level 3: Major (Main element broken, significant animation lag)"
        - "Level 4: Moderate (Secondary feature glitch, layout alignment issue)"
        - "Level 5: Minor (Small UI glitch, console warning)"
        - "Level 6: Cosmetic (Typo, theme styling polish, visual improvement)"
        - "Level 7: Enhancement (New custom relationship template or feature idea)"
        - "Level 8: Refactor (Code smell, tech debt, directory cleanup)"
        - "Level 9: Documentation (FAQ, ENV_GUIDE, readme update)"
        - "Level 10: Customization (Creating new templates, custom emoji set configs)"
        - "Level 11: Accessibility (Aria-label, keyboard navigation, screen reader fix)"
        - "Level 12: CI/CD & Security (Build warning, GitHub Action improvement)"
    validations:
      required: true
