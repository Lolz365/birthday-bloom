name: Documentation Improvement
description: Suggest changes to Birthday Bloom's documentation
labels: [documentation]
body:
  - type: markdown
    attributes:
      value: |
        Help us make Birthday Bloom's docs better. Thank you!

  - type: dropdown
    id: doc_type
    attributes:
      label: Which documentation area?
      options:
        - README
        - ENV_GUIDE.md
        - Architecture docs
        - Contributing guide
        - Setup / installation docs
        - Deployment docs
        - Troubleshooting docs
        - Other

  - type: textarea
    id: issue
    attributes:
      label: What is confusing, missing, or wrong?
      description: Be specific — point to the file and section if possible.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
      description: How would you improve it?
    validations:
      required: true

  - type: dropdown
    id: audience
    attributes:
      label: Who would this help?
      options:
        - New users trying to customize the app
        - Developers contributing to the codebase
        - Deployers / DevOps
        - Everyone

  - type: dropdown
    id: level
    attributes:
      label: Severity / Triage Level
      description: Select the impact or priority level of this issue.
      options:
        - "Level 1: Blocker (Crash, data loss, security vulnerability)"
        - "Level 2: Critical (Core feature broken, major UI crash)"
        - "Level 3: Major (Main element broken, significant animation lag)"
        - "Level 4: Moderate (Secondary feature glitch, layout alignment issue)"
        - "Level 5: Minor (Small UI glitch, console warning)"
        - "Level 6: Cosmetic (Typo, theme styling polish, visual improvement)"
        - "Level 7: Enhancement (New custom relationship template or feature idea)"
        - "Level 8: Refactor (Code smell, tech debt, directory cleanup)"
        - "Level 9: Documentation (FAQ, ENV_GUIDE, readme update)"
        - "Level 10: Customization (Creating new templates, custom emoji set configs)"
        - "Level 11: Accessibility (Aria-label, keyboard navigation, screen reader fix)"
        - "Level 12: CI/CD & Security (Build warning, GitHub Action improvement)"
    validations:
      required: true
