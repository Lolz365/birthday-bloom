name: Feature Request
description: Suggest an idea for Birthday Bloom
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe it clearly below.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What is missing today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any workarounds or alternative approaches?

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      multiple: true
      options:
        - Configuration / Environment Variables
        - User Experience / UI
        - Animations / Visuals
        - Accessibility
        - Documentation
        - Performance
        - Developer Experience
        - Deployment

  - type: textarea
    id: mockups
    attributes:
      label: Mockups / Examples
      description: Links, sketches, or references that help explain the idea.

  - type: dropdown
    id: level
    attributes:
      label: Difficulty Level
      description: Select the estimated difficulty level.
      options:
        - "level: beginner (Good first issue, simple CSS/HTML tweaks)"
        - "level: intermediate (Standard React components and state)"
        - "level: advanced (Complex animations, core architecture changes)"
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: This feature aligns with Birthday Bloom's env-first philosophy
