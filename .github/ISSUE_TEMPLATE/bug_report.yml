name: Bug Report
description: Report a bug in Birthday Bloom
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the details below.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: How can we reproduce this?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Video
      description: If visual, attach screenshots or recordings.
      placeholder: Drag & drop files here

  - type: input
    id: browser
    attributes:
      label: Browser & Device
      description: e.g., Chrome 120 on Windows 11, Safari on iPhone 15
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment Variables
      description: Which env values are you using? (redact personal info)
      placeholder: VITE_BIRTHDAY_RELATIONSHIP=partner, VITE_THEME=romantic, etc.

  - type: dropdown
    id: level
    attributes:
      label: Difficulty Level
      description: Select the estimated difficulty level.
      options:
        - "level: beginner (Good first issue, simple CSS/HTML tweaks)"
        - "level: intermediate (Standard React components and state)"
        - "level: advanced (Complex animations, core architecture changes)"
    validations:
      required: true

  - type: dropdown
    id: context
    attributes:
      label: Where does the issue occur?
      multiple: true
      options:
        - Local development (npm run dev)
        - Production build (npm run build)
        - Deployed on Vercel / Netlify
        - Runtime behavior
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I have tested with the latest code on main
