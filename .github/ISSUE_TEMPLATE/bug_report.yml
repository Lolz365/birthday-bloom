name: Bug Report
description: Report a bug in Birthday Bloom
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the details below.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: How can we reproduce this?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Video
      description: If visual, attach screenshots or recordings.
      placeholder: Drag & drop files here

  - type: input
    id: browser
    attributes:
      label: Browser & Device
      description: e.g., Chrome 120 on Windows 11, Safari on iPhone 15
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment Variables
      description: Which env values are you using? (redact personal info)
      placeholder: VITE_BIRTHDAY_RELATIONSHIP=partner, VITE_THEME=romantic, etc.

  - type: dropdown
    id: level
    attributes:
      label: Severity / Triage Level
      description: Select the impact or priority level of this issue.
      options:
        - "Level 1: Blocker (Crash, data loss, security vulnerability)"
        - "Level 2: Critical (Core feature broken, major UI crash)"
        - "Level 3: Major (Main element broken, significant animation lag)"
        - "Level 4: Moderate (Secondary feature glitch, layout alignment issue)"
        - "Level 5: Minor (Small UI glitch, console warning)"
        - "Level 6: Cosmetic (Typo, theme styling polish, visual improvement)"
        - "Level 7: Enhancement (New custom relationship template or feature idea)"
        - "Level 8: Refactor (Code smell, tech debt, directory cleanup)"
        - "Level 9: Documentation (FAQ, ENV_GUIDE, readme update)"
        - "Level 10: Customization (Creating new templates, custom emoji set configs)"
        - "Level 11: Accessibility (Aria-label, keyboard navigation, screen reader fix)"
        - "Level 12: CI/CD & Security (Build warning, GitHub Action improvement)"
    validations:
      required: true

  - type: dropdown
    id: context
    attributes:
      label: Where does the issue occur?
      multiple: true
      options:
        - Local development (npm run dev)
        - Production build (npm run build)
        - Deployed on Vercel / Netlify
        - Runtime behavior
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I have tested with the latest code on main
