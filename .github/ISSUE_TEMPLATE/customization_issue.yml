name: Customization & Theme Issue
description: Report issues related to personalization, custom family templates, and theme settings.
labels: [customization]
body:
  - type: markdown
    attributes:
      value: |
        Personalization is at the core of Birthday Bloom. Please help us fix any issues in configuring and customizing the site!

  - type: textarea
    id: details
    attributes:
      label: Customization details
      description: Explain what you are trying to customize (e.g., custom relationship labels, interests, emojis, custom letter overrides) and what is not working as expected.
    validations:
      required: true

  - type: textarea
    id: env_vars
    attributes:
      label: Relevant Env Configuration
      description: Share the VITE_* environment variables you are using (redact any sensitive information).
      placeholder: |
        VITE_BIRTHDAY_RELATIONSHIP=custom
        VITE_FAMILY_CLOSENESS=8
        VITE_THEME=nostalgic

  - type: dropdown
    id: level
    attributes:
      label: Severity / Triage Level
      description: Select the impact or priority level of this issue.
      options:
        - "Level 1: Blocker (Crash, data loss, security vulnerability)"
        - "Level 2: Critical (Core feature broken, major UI crash)"
        - "Level 3: Major (Main element broken, significant animation lag)"
        - "Level 4: Moderate (Secondary feature glitch, layout alignment issue)"
        - "Level 5: Minor (Small UI glitch, console warning)"
        - "Level 6: Cosmetic (Typo, theme styling polish, visual improvement)"
        - "Level 7: Enhancement (New custom relationship template or feature idea)"
        - "Level 8: Refactor (Code smell, tech debt, directory cleanup)"
        - "Level 9: Documentation (FAQ, ENV_GUIDE, readme update)"
        - "Level 10: Customization (Creating new templates, custom emoji set configs)"
        - "Level 11: Accessibility (Aria-label, keyboard navigation, screen reader fix)"
        - "Level 12: CI/CD & Security (Build warning, GitHub Action improvement)"
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I verified that the variables are formatted correctly in my .env file
