# .github/labeler.yml
# Configuration for actions/labeler v5

documentation:
  - changed-files:
      - any-glob-to-any-file: ['docs/**/*', '*.md']

customization:
  - changed-files:
      - any-glob-to-any-file: ['.env.example', 'src/config.ts', 'src/config/**/*', 'src/features/core/models/familyTemplates.ts']

ci-cd:
  - changed-files:
      - any-glob-to-any-file: ['.github/workflows/**/*', '.github/dependabot.yml', 'vercel.json']

refactor:
  - changed-files:
      - any-glob-to-any-file: ['src/utils/**/*', 'src/lib/**/*', 'src/features/core/store/**/*']
