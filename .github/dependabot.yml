version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
    groups:
      react-ecosystem:
        patterns:
          - "react*"
          - "@types/react*"
          - "@hookform/*"
          - "@tanstack/*"
          - "recharts"
        update-types:
          - "minor"
          - "patch"
      radix-ui:
        patterns:
          - "@radix-ui/*"
        update-types:
          - "minor"
          - "patch"
      runtime-utilities:
        patterns:
          - "clsx"
          - "class-variance-authority"
          - "tailwind-merge"
          - "tailwindcss-animate"
          - "date-fns"
          - "zod"
          - "zustand"
          - "next-themes"
          - "sonner"
          - "vaul"
          - "cmdk"
          - "input-otp"
          - "canvas-confetti"
        update-types:
          - "minor"
          - "patch"
      ui-libraries:
        patterns:
          - "framer-motion"
          - "lucide-react"
          - "embla-carousel-react"
        update-types:
          - "minor"
          - "patch"
      linting:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript-eslint"
          - "globals"
        update-types:
          - "minor"
          - "patch"
      build-tools:
        patterns:
          - "vite*"
          - "@vitejs/*"
          - "typescript"
          - "postcss"
          - "autoprefixer"
          - "tailwindcss"
          - "@tailwindcss/*"
        update-types:
          - "minor"
          - "patch"
      testing:
        patterns:
          - "@testing-library/*"
          - "vitest*"
          - "jsdom"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "@types/node"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    labels:
      - "ci"
      - "dependencies"
    groups:
      actions:
        patterns:
          - "*"
